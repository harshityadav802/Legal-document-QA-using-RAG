services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: legal-qa-api
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      ENDEE_INDEX_NAME: ${ENDEE_INDEX_NAME:-legal_docs}
      ENDEE_BASE_URL: http://endee:8080
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend:3000
    volumes:
      - ./data:/app/data
    depends_on:
      - endee
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal-qa-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  endee-data:
